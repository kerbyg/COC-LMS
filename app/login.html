<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | COC-LMS</title>
    <link rel="icon" type="image/png" href="/COC-LMS/assets/images/phinma_logo2.png">
    <link rel="stylesheet" href="/COC-LMS/css/auth.css">
</head>
<body>

    <div class="auth-page">

        <!-- Branding above card -->
        <div class="auth-brand">
            <img src="/COC-LMS/assets/images/phinma_logo2.png" alt="PHINMA Logo" class="brand-logo">
            <h1 class="brand-title">Cagayan De Oro College</h1>
            <p class="brand-sub">Max Suniel St.Carmen, Cagayan De Oro City,</p>
            <p class="brand-school">Misamis Oriental, Philippines 9000</p>
        </div>

        <!-- White Card -->
        <div class="auth-card">
            <h2 class="card-title">Welcome Back</h2>
            <p class="card-sub">Sign in to continue to your dashboard</p>

            <div id="error-container" style="display:none;"></div>

            <form id="login-form" autocomplete="on">

                <div class="form-group">
                    <label for="user_id">User ID</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </span>
                        <input type="text" id="user_id" name="user_id" placeholder="Student ID or Employee ID" autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </span>
                        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required minlength="6">
                        <button type="button" id="password-toggle" class="pw-toggle" title="Show/hide password">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-wrap">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <div class="form-group">
                    <label>Captcha Verification</label>
                    <div class="captcha-row">
                        <div class="captcha-text-box" id="captcha-challenge"></div>
                        <button type="button" id="captcha-refresh" class="captcha-reload" title="Refresh">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                                <path d="M3 3v5h5"/>
                            </svg>
                        </button>
                    </div>
                    <div class="input-wrap" style="margin-top:10px;">
                        <span class="input-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        </span>
                        <input type="text" id="captcha-input" placeholder="Enter the answer" autocomplete="off" inputmode="numeric" maxlength="3" required>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="btn-signin">
                    <span id="btn-text">Sign In</span>
                </button>

            </form>
        </div>

        <!-- Page Footer -->
        <div class="auth-page-footer">
            <p>© 2025 PHINMA Cagayan de Oro College</p>
            <p>Making Lives Better Through Education</p>
        </div>

    </div><!-- /.auth-page -->

    <script type="module">
        import { Api } from '/COC-LMS/app/js/api.js';
        import { Auth } from '/COC-LMS/app/js/auth.js';

        const user = await Auth.check();
        if (user) window.location.href = '/COC-LMS/app/index.html';

        let captchaAnswer = '';
        function generateCaptcha() {
            const a = Math.floor(Math.random() * 20) + 1;
            const b = Math.floor(Math.random() * 20) + 1;
            captchaAnswer = String(a + b);
            document.getElementById('captcha-challenge').textContent = `${a}  +  ${b}  =  ?`;
            document.getElementById('captcha-input').value = '';
            document.getElementById('captcha-input').classList.remove('error', 'correct');
        }
        generateCaptcha();
        document.getElementById('captcha-refresh').addEventListener('click', generateCaptcha);

        // Live captcha color feedback
        document.getElementById('captcha-input').addEventListener('input', (e) => {
            const input = e.target;
            const val   = input.value.trim();
            input.classList.remove('error', 'correct');
            if (val === '') return;
            if (val === captchaAnswer) {
                input.classList.add('correct');
            } else if (val.length >= captchaAnswer.length) {
                input.classList.add('error');
            }
        });

        document.getElementById('password-toggle').addEventListener('click', () => {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        });

        // Ripple effect on Sign In button
        const btn = document.getElementById('submit-btn');
        btn.addEventListener('mousedown', (e) => {
            if (btn.disabled) return;
            const rect   = btn.getBoundingClientRect();
            const size   = Math.max(rect.width, rect.height) * 2;
            const x      = e.clientX - rect.left - size / 2;
            const y      = e.clientY - rect.top  - size / 2;
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
            btn.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnText        = document.getElementById('btn-text');
            const errorContainer = document.getElementById('error-container');
            const captchaInput   = document.getElementById('captcha-input');

            if (captchaInput.value.trim() !== captchaAnswer) {
                captchaInput.classList.add('error');
                captchaInput.value = '';
                captchaInput.focus();
                generateCaptcha();
                errorContainer.innerHTML = `<div class="auth-error"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><span>Incorrect answer. A new question has been generated.</span></div>`;
                errorContainer.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div> Signing in...';
            errorContainer.style.display = 'none';

            try {
                const result = await Api.post('/AuthAPI.php?action=login', {
                    user_id: document.getElementById('user_id').value.trim(),
                    password: document.getElementById('password').value
                });

                if (result.success) {
                    if (result.data?.token) localStorage.setItem('jwt_token', result.data.token);
                    btn.classList.add('success');
                    btnText.innerHTML = `<svg class="check-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Welcome!`;
                    setTimeout(() => { window.location.href = '/COC-LMS/app/index.html'; }, 600);
                } else {
                    generateCaptcha();
                    errorContainer.innerHTML = `<div class="auth-error"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><span>${result.message}</span></div>`;
                    errorContainer.style.display = 'block';
                    btn.disabled = false;
                    btnText.textContent = 'Sign In';
                }
            } catch (err) {
                generateCaptcha();
                errorContainer.innerHTML = `<div class="auth-error"><span>An error occurred. Please try again.</span></div>`;
                errorContainer.style.display = 'block';
                btn.disabled = false;
                btnText.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
